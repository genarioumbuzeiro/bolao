<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolão de Jogos — Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5; color: #1a1a2e; padding: 20px;
    }
    .container { max-width: 960px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 20px; font-size: 26px; }
    h1 span { color: #e63946; }
    .nav-user {
      text-align: center; margin-bottom: 20px;
    }
    .nav-user a {
      color: #888; font-size: 13px; text-decoration: none;
    }
    .nav-user a:hover { color: #4361ee; }

    .card {
      background: #fff; border-radius: 12px; padding: 20px;
      margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 2px solid #f0f2f5;
    }
    .card-header h2 { font-size: 18px; color: #333; }
    .hidden { display: none !important; }

    .btn {
      padding: 10px 20px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-success { background: #2ec4b6; color: #fff; }
    .btn-success:hover { background: #25a99d; }
    .btn-danger { background: #e63946; color: #fff; }
    .btn-danger:hover { background: #c92f3b; }
    .btn-warning { background: #f4a261; color: #fff; }
    .btn-warning:hover { background: #e08f4a; }
    .btn-outline { background: transparent; border: 2px solid #e0e0e0; color: #666; }
    .btn-outline:hover { border-color: #4361ee; color: #4361ee; }
    .btn-sm { padding: 6px 14px; font-size: 12px; }

    .form-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .form-grid input {
      padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 8px;
      font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .form-grid input:focus { border-color: #4361ee; }
    .form-grid .actions {
      grid-column: 1 / -1; display: flex; gap: 8px; justify-content: flex-end;
    }

    .jogo {
      display: flex; align-items: center; gap: 12px;
      padding: 16px; border-radius: 8px;
      border: 1px solid #f0f2f5; margin-bottom: 10px; flex-wrap: wrap;
    }
    .jogo-info { flex: 1; min-width: 180px; }
    .jogo-times { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .jogo-detalhes { font-size: 12px; color: #888; }
    .jogo-odds { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .jogo-odds span {
      font-size: 11px; background: #f8f9fa; padding: 2px 8px;
      border-radius: 4px; color: #666;
    }
    .jogo-acoes { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; align-items: center; }

    .resultado {
      font-weight: 700; font-size: 18px; padding: 4px 12px; border-radius: 8px;
    }
    .resultado.finalizado { background: #e8f5e9; color: #2e7d32; }
    .resultado.pendente { background: #fff3e0; color: #e65100; }
    .resultado.bloqueado { background: #e0e0e0; color: #666; }

    .part-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid #f0f2f5; gap: 8px;
    }
    .part-row:last-child { border-bottom: none; }

    .palpite-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid #f0f2f5; gap: 8px;
    }
    .palpite-item:last-child { border-bottom: none; }
    .palpite-acerto { color: #2e7d32; font-weight: 700; }
    .palpite-erro { color: #c62828; font-weight: 700; }
    .palpite-pendente { color: #e65100; }

    .vazio { text-align: center; padding: 32px; color: #999; }

    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: #333; color: #fff; padding: 12px 24px;
      border-radius: 8px; font-size: 14px;
      opacity: 0; transition: opacity 0.3s; z-index: 999;
    }
    .toast.show { opacity: 1; }
    .toast.erro { background: #e63946; }
    .toast.sucesso { background: #2ec4b6; }

    .tab-bar {
      display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .tab-btn {
      padding: 10px 18px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      background: #e0e0e0; color: #666; transition: all 0.2s; flex: 1; min-width: 80px; text-align: center;
    }
    .tab-btn:hover { background: #d0d0d0; }
    .tab-btn.active { background: #4361ee; color: #fff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .tab-btn { font-size: 12px; padding: 8px 6px; min-width: 60px; }
    }
  </style>
</head>
<body>
<div class="container" id="conteudo-admin">
  <h1>⚙️ <span>Bolão</span> — Admin</h1>

  <div class="nav-user">
    <a href="index.html" target="_blank">🎯 Apostador</a>
    <a href="resultados.html" target="_blank" style="margin-left:12px;">📊 Resultados</a>
  </div>

  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="tab-jogos">📋 Jogos</button>
    <button class="tab-btn" data-tab="tab-participantes">👥 Participantes</button>
    <button class="tab-btn" data-tab="tab-aprovar">✅ Aprovar</button>
    <button class="tab-btn" data-tab="tab-palpites">📊 Palpites</button>
    <button class="tab-btn" data-tab="tab-config">⚙️ Config</button>
  </div>

  <!-- Tab: Jogos -->
  <div class="tab-content active" id="tab-jogos">
    <div class="card">
      <div class="card-header"><h2 id="titulo-form-jogo">Cadastrar Jogo</h2></div>
      <div class="form-grid">
        <input type="text" id="cad-time-casa" placeholder="Time casa" />
        <input type="text" id="cad-time-fora" placeholder="Time fora" />
        <input type="date" id="cad-data" />
        <input type="time" id="cad-horario" value="16:00" />
        <input type="text" id="cad-estadio" placeholder="Estádio" />
        <input type="text" id="cad-fase" placeholder="Fase" />
        <input type="number" step="0.01" id="cad-odds-casa" placeholder="Odd casa" />
        <input type="number" step="0.01" id="cad-odds-empate" placeholder="Odd empate" />
        <input type="number" step="0.01" id="cad-odds-fora" placeholder="Odd fora" />
        <div class="actions">
          <button class="btn btn-outline btn-sm hidden" id="btn-cancel-edicao" onclick="cancelarEdicaoJogo()">Cancelar</button>
          <button class="btn btn-success" onclick="adicionarJogo()">Adicionar Jogo</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <h2>Gerenciar Jogos</h2>
        <span id="contagem-admin" style="font-size:13px;color:#888;"></span>
      </div>
      <div id="lista-admin-jogos"></div>
    </div>
  </div>

  <!-- Tab: Participantes -->
  <div class="tab-content" id="tab-participantes">
    <div class="card">
      <div class="card-header"><h2 id="titulo-form-part">Cadastrar Participante</h2></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <input type="text" id="cad-part-nome" placeholder="Nome completo" style="flex:1;min-width:200px;padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;" />
        <input type="tel" id="cad-part-tel" placeholder="Telefone" style="flex:1;min-width:160px;padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;" />
        <input type="password" id="cad-part-senha" placeholder="Senha" style="flex:1;min-width:120px;padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;" />
        <button class="btn btn-success" onclick="adicionarParticipante()">Adicionar</button>
        <button class="btn btn-outline btn-sm hidden" id="btn-cancel-part" onclick="cancelarEdicaoPart()">Cancelar</button>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <h2>Participantes</h2>
        <span><span id="contagem-parts" style="font-size:13px;color:#888;"></span><button class="btn btn-outline btn-sm" style="margin-left:8px;" onclick="recarregarDados()" title="Atualizar">🔄</button></span>
      </div>
      <div id="lista-participantes"></div>
    </div>
  </div>

  <!-- Tab: Aprovar -->
  <div class="tab-content" id="tab-aprovar">
    <div class="card">
      <div class="card-header"><h2>Aprovar Palpites</h2><button class="btn btn-outline btn-sm" onclick="renderAprovarPalpites()">🔄</button></div>
      <div id="lista-aprovar-palpites"></div>
    </div>
  </div>

  <!-- Tab: Palpites -->
  <div class="tab-content" id="tab-palpites">
    <div class="card">
      <div class="card-header"><h2>Todos os Palpites</h2><button class="btn btn-outline btn-sm" onclick="recarregarDados()" title="Atualizar lista">🔄</button></div>
      <div id="lista-todos-palpites"></div>
    </div>
  </div>

  <!-- Tab: Config -->
  <div class="tab-content" id="tab-config">
    <div class="card" id="card-qrcode">
      <div class="card-header"><h2>Compartilhe com os Apostadores</h2></div>
      <div id="qrcode-container" style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;"></div>
    </div>
    <div class="card">
      <div class="card-header"><h2>Personalizar</h2></div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <input type="text" id="cfg-titulo" placeholder="Título do Bolão" style="flex:1;min-width:200px;padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;" />
        <button class="btn btn-success" onclick="salvarTitulo()">💾 Salvar</button>
      </div>
      <div style="margin-top:12px;font-size:13px;color:#888;" id="cfg-server-info"></div>
    </div>
    <div class="card">
      <div class="card-header"><h2>Zerar Bolão</h2></div>
      <div style="text-align:center;">
        <p style="font-size:13px;color:#888;margin-bottom:12px;">Remove todos os jogos, participantes e palpites. Esta ação não pode ser desfeita.</p>
        <button class="btn btn-danger" onclick="limparTudo()">🗑️ Limpar Todos os Dados</button>
        <button class="btn btn-outline" style="margin-top:8px;border-color:#e0a800;color:#e0a800;" onclick="limparPalpites()">🧹 Zerar só Palpites</button>
        <button class="btn btn-outline" style="margin-top:8px;border-color:#e63946;color:#e63946;" onclick="limparParticipantes()">👥 Excluir Todos os Participantes</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let jogos = [];
let participantes = [];
let palpites = [];
let editandoJogoId = null;
let editandoPartId = null;

function fmtData(d) { if (!d) return ''; const p = d.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }

function mostrarToast(msg, tipo) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + (tipo || '') + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function carregarDados() {
  try {
    const [rj, rp, rpp] = await Promise.all([
      fetch('jogos.json').then(r => r.json()),
      fetch('participantes.json').then(r => r.json()),
      fetch('palpites.json').then(r => r.json())
    ]);
    jogos = rj; participantes = rp; palpites = rpp;
  } catch (e) {
    const ls = localStorage;
    jogos = JSON.parse(ls.getItem('jogos.json') || '[]');
    participantes = JSON.parse(ls.getItem('participantes.json') || '[]');
    palpites = JSON.parse(ls.getItem('palpites.json') || '[]');
  }
  renderAdmin();
}

function renderAdmin() {
  renderAdminJogos();
  renderParticipantes();
  renderTodosPalpites();
  renderAprovarPalpites();
  document.getElementById('contagem-admin').textContent = jogos.length + ' jogos';
  document.getElementById('contagem-parts').textContent = participantes.length + ' participante(s)';
}

// --- Participantes CRUD ---

function limparFormPart() {
  document.getElementById('cad-part-nome').value = '';
  document.getElementById('cad-part-tel').value = '';
  document.getElementById('cad-part-senha').value = '';
  document.getElementById('titulo-form-part').textContent = 'Cadastrar Participante';
  document.getElementById('btn-cancel-part').classList.add('hidden');
  editandoPartId = null;
}

function cancelarEdicaoPart() { limparFormPart(); }

function adicionarParticipante() {
  const nome = document.getElementById('cad-part-nome').value.trim();
  const tel = document.getElementById('cad-part-tel').value.trim();
  const senha = document.getElementById('cad-part-senha').value;
  if (!nome || !tel) { mostrarToast('Preencha nome e telefone', 'erro'); return; }

  if (participantes.some(p => p.nome.toLowerCase() === nome.toLowerCase() && p.id !== editandoPartId)) {
    mostrarToast('Já existe um participante com este nome', 'erro');
    return;
  }

  if (editandoPartId) {
    const idx = participantes.findIndex(p => p.id === editandoPartId);
    if (idx >= 0) { participantes[idx].nome = nome; participantes[idx].telefone = tel; if (senha) participantes[idx].senha = senha; }
    editandoPartId = null;
    mostrarToast('Participante atualizado!', 'sucesso');
  } else {
    participantes.push({ id: Date.now(), nome, telefone: tel, senha: senha || '1234', status: 'approved' });
    mostrarToast('Participante cadastrado!', 'sucesso');
  }

  limparFormPart();
  salvarJSON('participantes.json', participantes);
  renderParticipantes();
  document.getElementById('contagem-parts').textContent = participantes.length + ' participante(s)';
}

function editarParticipante(id) {
  const p = participantes.find(x => x.id === id);
  if (!p) return;
  document.getElementById('cad-part-nome').value = p.nome;
  document.getElementById('cad-part-tel').value = p.telefone;
  document.getElementById('cad-part-senha').value = p.senha || '';
  editandoPartId = id;
  document.getElementById('titulo-form-part').textContent = 'Editando Participante';
  document.getElementById('btn-cancel-part').classList.remove('hidden');
  document.getElementById('cad-part-nome').scrollIntoView({ behavior: 'smooth' });
}

function excluirParticipante(id) {
  if (!confirm('Excluir este participante?\nOs palpites dele também serão removidos.')) return;
  participantes = participantes.filter(p => p.id !== id);
  palpites = palpites.filter(p => p.participante_id !== id);
  salvarJSON('participantes.json', participantes);
  salvarJSON('palpites.json', palpites);
  renderAdmin();
  document.getElementById('contagem-parts').textContent = participantes.length + ' participante(s)';
  mostrarToast('Participante excluído', 'sucesso');
}

function aprovarParticipante(id, status) {
  const p = participantes.find(x => x.id === id);
  if (!p) return;
  p.status = status;
  salvarJSON('participantes.json', participantes);
  renderParticipantes();
  mostrarToast(status === 'approved' ? 'Participante aprovado!' : 'Participante recusado!', 'sucesso');
}

function renderParticipantes() {
  const div = document.getElementById('lista-participantes');
  if (!participantes.length) { div.innerHTML = '<div class="vazio">Nenhum participante cadastrado</div>'; return; }
  div.innerHTML = participantes.map(p => {
    const qtd = palpites.filter(x => x.participante_id === p.id).length;
    const st = p.status || 'approved';
    let badge = '<span class="palpite-acerto" style="font-size:11px;">✅</span>';
    if (st === 'pending') badge = '<span class="palpite-pendente" style="font-size:11px;">⏳ Pendente</span>';
    else if (st === 'rejected') badge = '<span class="palpite-erro" style="font-size:11px;">🚫</span>';
    return `<div class="part-row">
      <span><strong>${p.nome}</strong> · ${p.telefone} · <span style="font-size:13px;color:#888;">${qtd} palpite(s)</span> ${badge}</span>
      <span style="display:flex;gap:6px;">
        ${st === 'pending' ? `<button class="btn btn-success btn-sm" onclick="aprovarParticipante(${p.id},'approved')">✅</button><button class="btn btn-danger btn-sm" onclick="aprovarParticipante(${p.id},'rejected')">❌</button>` : ''}
        <button class="btn btn-warning btn-sm" onclick="editarParticipante(${p.id})">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="excluirParticipante(${p.id})">🗑️</button>
      </span>
    </div>`;
  }).join('');
}

// --- Jogos CRUD ---

function jogoIniciado(j) {
  if (j.placar_casa !== null) return true;
  if (!j.data || !j.horario) return false;
  const agora = new Date();
  const [h, m] = j.horario.split(':').map(Number);
  const jogoData = new Date(j.data.split('-')[0], j.data.split('-')[1] - 1, j.data.split('-')[2], h, m);
  return agora >= jogoData;
}

function renderAdminJogos() {
  const div = document.getElementById('lista-admin-jogos');
  if (!jogos.length) { div.innerHTML = '<div class="vazio">Nenhum jogo cadastrado</div>'; return; }

  div.innerHTML = jogos.map(j => {
    const fin = j.placar_casa !== null;
    const iniciado = jogoIniciado(j);

    let statusLabel;
    if (fin) {
      statusLabel = `<span class="resultado finalizado" style="font-size:14px;">${j.placar_casa}×${j.placar_fora}</span>`;
    } else if (iniciado) {
      statusLabel = `<span class="resultado bloqueado" style="font-size:14px;">🔒 Em andamento</span>`;
    } else {
      statusLabel = `<span class="resultado pendente" style="font-size:14px;">⏳ Aguardando</span>`;
    }

    return `<div class="jogo">
      <div class="jogo-info">
        <div class="jogo-times">${j.time_casa} × ${j.time_fora}</div>
        <div class="jogo-detalhes">${fmtData(j.data)} às ${j.horario} · ${j.estadio} · ${j.fase}</div>
        <div class="jogo-odds">
          <span>Casa: ${j.odds_casa?.toFixed(2) || '-'}</span>
          <span>Empate: ${j.odds_empate?.toFixed(2) || '-'}</span>
          <span>Fora: ${j.odds_fora?.toFixed(2) || '-'}</span>
        </div>
        <div class="jogo-acoes">
          <button class="btn btn-warning btn-sm" onclick="editarJogo(${j.id})">✏️ Editar</button>
          <button class="btn btn-danger btn-sm" onclick="excluirJogo(${j.id})">🗑️ Excluir</button>
          ${fin ? statusLabel : `<button class="btn btn-success btn-sm" onclick="finalizarJogo(${j.id})">✅ Finalizar</button>`}
        </div>
      </div>
    </div>`;
  }).join('');
}

function pegarDadosFormJogo() {
  return {
    time_casa: document.getElementById('cad-time-casa').value.trim(),
    time_fora: document.getElementById('cad-time-fora').value.trim(),
    data: document.getElementById('cad-data').value,
    horario: document.getElementById('cad-horario').value,
    estadio: document.getElementById('cad-estadio').value.trim(),
    fase: document.getElementById('cad-fase').value.trim(),
    odds_casa: parseFloat(document.getElementById('cad-odds-casa').value) || null,
    odds_empate: parseFloat(document.getElementById('cad-odds-empate').value) || null,
    odds_fora: parseFloat(document.getElementById('cad-odds-fora').value) || null
  };
}

function limparFormJogo() {
  ['cad-time-casa','cad-time-fora','cad-data','cad-horario','cad-estadio','cad-fase','cad-odds-casa','cad-odds-empate','cad-odds-fora'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('cad-horario').value = '16:00';
  document.getElementById('titulo-form-jogo').textContent = 'Cadastrar Jogo';
  document.getElementById('btn-cancel-edicao').classList.add('hidden');
  editandoJogoId = null;
}

function cancelarEdicaoJogo() { limparFormJogo(); }

function adicionarJogo() {
  const d = pegarDadosFormJogo();
  if (!d.time_casa || !d.time_fora) { mostrarToast('Preencha time casa e time fora', 'erro'); return; }

  if (editandoJogoId) {
    const idx = jogos.findIndex(j => j.id === editandoJogoId);
    if (idx >= 0) jogos[idx] = { ...jogos[idx], ...d, placar_casa: jogos[idx].placar_casa, placar_fora: jogos[idx].placar_fora };
    editandoJogoId = null;
    mostrarToast('Jogo atualizado!', 'sucesso');
  } else {
    jogos.push({ id: Date.now(), ...d, placar_casa: null, placar_fora: null });
    mostrarToast('Jogo adicionado!', 'sucesso');
  }

  limparFormJogo();
  salvarJSON('jogos.json', jogos);
  renderAdminJogos();
  document.getElementById('contagem-admin').textContent = jogos.length + ' jogos';
}

function editarJogo(id) {
  const j = jogos.find(x => x.id === id);
  if (!j) return;
  document.getElementById('cad-time-casa').value = j.time_casa || '';
  document.getElementById('cad-time-fora').value = j.time_fora || '';
  document.getElementById('cad-data').value = j.data || '';
  document.getElementById('cad-horario').value = j.horario || '';
  document.getElementById('cad-estadio').value = j.estadio || '';
  document.getElementById('cad-fase').value = j.fase || '';
  document.getElementById('cad-odds-casa').value = j.odds_casa ?? '';
  document.getElementById('cad-odds-empate').value = j.odds_empate ?? '';
  document.getElementById('cad-odds-fora').value = j.odds_fora ?? '';
  editandoJogoId = id;
  document.getElementById('titulo-form-jogo').textContent = 'Editando Jogo';
  document.getElementById('btn-cancel-edicao').classList.remove('hidden');
  document.getElementById('cad-time-casa').scrollIntoView({ behavior: 'smooth' });
}

function excluirJogo(id) {
  if (!confirm('Excluir este jogo?')) return;
  jogos = jogos.filter(j => j.id !== id);
  palpites = palpites.filter(p => p.jogo_id !== id);
  salvarJSON('jogos.json', jogos);
  salvarJSON('palpites.json', palpites);
  renderAdmin();
  document.getElementById('contagem-admin').textContent = jogos.length + ' jogos';
  mostrarToast('Jogo excluído', 'sucesso');
}

function finalizarJogo(id) {
  const j = jogos.find(x => x.id === id);
  if (!j) return;
  const pc = prompt('Placar ' + j.time_casa + ':', j.placar_casa ?? '');
  if (pc === null) return;
  const pf = prompt('Placar ' + j.time_fora + ':', j.placar_fora ?? '');
  if (pf === null) return;
  const pcn = parseInt(pc), pfn = parseInt(pf);
  if (isNaN(pcn) || isNaN(pfn)) { mostrarToast('Digite números válidos', 'erro'); return; }
  j.placar_casa = pcn; j.placar_fora = pfn;
  salvarJSON('jogos.json', jogos);
  renderAdmin();
  mostrarToast(`${j.time_casa} ${pcn} × ${pfn} ${j.time_fora}`, 'sucesso');
}

// --- Todos os palpites ---

function renderTodosPalpites() {
  const div = document.getElementById('lista-todos-palpites');
  if (!palpites.length) { div.innerHTML = '<div class="vazio">Nenhum palpite ainda</div>'; return; }

  const agrupado = {};
  palpites.forEach(p => {
    if (!agrupado[p.participante_id]) agrupado[p.participante_id] = [];
    agrupado[p.participante_id].push(p);
  });

  div.innerHTML = Object.keys(agrupado).map(idPart => {
    const part = participantes.find(p => p.id === parseInt(idPart));
    const nome = part ? part.nome : 'ID ' + idPart;
    const lista = agrupado[idPart];
    let acertos = 0, total = 0;
    const detalhes = lista.map(p => {
      const j = jogos.find(x => x.id === p.jogo_id);
      if (!j) return '';
      const fin = j.placar_casa !== null;
      if (fin) { total++; if (p.placar_casa === j.placar_casa && p.placar_fora === j.placar_fora) acertos++; }
      const stat = p.status || 'approved';
      let badge = '';
      if (!fin && stat === 'pending') badge = '<span class="palpite-pendente" style="font-size:11px;">⏳</span>';
      else if (!fin && stat === 'rejected') badge = '<span class="palpite-erro" style="font-size:11px;">🚫</span>';
      return `<div class="palpite-item">
        <span>${j.time_casa} × ${j.time_fora}</span>
        <span><strong>${p.placar_casa} × ${p.placar_fora}</strong>
          ${fin
            ? (p.placar_casa === j.placar_casa && p.placar_fora === j.placar_fora ? '<span class="palpite-acerto">✅</span>' : '<span class="palpite-erro">❌</span>')
            : badge}
        </span>
      </div>`;
    }).join('');

    return `<div class="card" style="margin-bottom:12px;padding:14px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <strong>${nome}</strong>
        ${total > 0 ? `<span style="font-size:13px;color:#888;">${acertos}/${total} acertos</span>` : ''}
      </div>
      ${detalhes}
    </div>`;
  }).join('');
}

// --- Aprovar palpites ---

function renderAprovarPalpites() {
  const div = document.getElementById('lista-aprovar-palpites');
  const pendentes = palpites.filter(p => (p.status || 'approved') === 'pending');
  if (!pendentes.length) { div.innerHTML = '<div class="vazio">Nenhum palpite pendente</div>'; return; }

  const agrupado = {};
  pendentes.forEach(p => {
    if (!agrupado[p.participante_id]) agrupado[p.participante_id] = [];
    agrupado[p.participante_id].push(p);
  });

  div.innerHTML = Object.keys(agrupado).map(idPart => {
    const part = participantes.find(p => p.id === parseInt(idPart));
    const nome = part ? part.nome : 'ID ' + idPart;
    const lista = agrupado[idPart];
    return `<div class="card" style="margin-bottom:12px;padding:14px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <strong>${nome}</strong>
        <button class="btn btn-success btn-sm" onclick="aprovarTodos('${idPart}')">✅ Aprovar todos</button>
      </div>
      ${lista.map(p => {
        const j = jogos.find(x => x.id === p.jogo_id);
        if (!j) return '';
        return `<div class="palpite-item">
          <span>${j.time_casa} × ${j.time_fora}</span>
          <span><strong>${p.placar_casa} × ${p.placar_fora}</strong></span>
          <span style="display:flex;gap:6px;">
            <button class="btn btn-success btn-sm" onclick="aprovarPalpite(${p.id},'approved')">✅</button>
            <button class="btn btn-danger btn-sm" onclick="aprovarPalpite(${p.id},'rejected')">❌</button>
          </span>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function aprovarPalpite(id, status) {
  const p = palpites.find(x => x.id === id);
  if (!p) return;
  p.status = status;
  salvarJSON('palpites.json', palpites);
  renderAprovarPalpites();
  renderTodosPalpites();
}

function aprovarTodos(participanteId) {
  const pid = parseInt(participanteId);
  palpites.forEach(p => { if (p.participante_id === pid && (p.status || 'approved') === 'pending') p.status = 'approved'; });
  salvarJSON('palpites.json', palpites);
  renderAprovarPalpites();
  renderTodosPalpites();
}

// --- Limpar tudo ---

function limparTudo() {
  if (!confirm('TEM CERTEZA? Isso vai apagar TODOS os jogos, participantes e palpites.')) return;
  if (!confirm('Confirmar: excluir todos os dados do bolão?')) return;
  jogos = []; participantes = []; palpites = [];
  ['jogos.json', 'participantes.json', 'palpites.json'].forEach(arq => {
    localStorage.setItem(arq, '[]');
    try { fetch(arq, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: '[]' }); } catch (e) {}
  });
  renderAdmin();
  document.getElementById('contagem-admin').textContent = '0 jogos';
  document.getElementById('contagem-parts').textContent = '0 participante(s)';
  mostrarToast('Todos os dados foram limpos!', 'sucesso');
}

function limparParticipantes() {
  if (!confirm('Excluir TODOS os participantes?')) return;
  if (!confirm('Confirmar: remover todos os participantes cadastrados?')) return;
  participantes = [];
  localStorage.setItem('participantes.json', '[]');
  try { fetch('participantes.json', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: '[]' }); } catch (e) {}
  renderAdmin();
  mostrarToast('Participantes excluídos!', 'sucesso');
}

function limparPalpites() {
  if (!confirm('Zerar todos os palpites?')) return;
  if (!confirm('Confirmar: apagar todos os palpites?')) return;
  palpites = [];
  localStorage.setItem('palpites.json', '[]');
  try { fetch('palpites.json', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: '[]' }); } catch (e) {}
  renderAdmin();
  mostrarToast('Palpites zerados!', 'sucesso');
}

let urlsQR = [];

function gerarQRCode() {
  fetch('server-ip').then(r => r.json()).then(d => {
    const container = document.getElementById('qrcode-container');
    container.innerHTML = '';
    const url = `http://${d.hostname}${d.basePath || ''}/`;
    urlsQR = [url];
    container.innerHTML = `
      <div style="text-align:center;">
        <div id="qrcode-single" style="display:inline-block;"></div>
        <p style="font-size:14px;font-weight:700;color:#4361ee;margin-top:8px;cursor:pointer;" onclick="copiarUrl('${url}')">${url}</p>
        <button class="btn btn-outline btn-sm" style="margin-top:8px;" onclick="imprimirQR()">🖨️ Imprimir</button>
      </div>
    `;
    new QRCode(document.getElementById('qrcode-single'), {
      text: url, width: 180, height: 180,
      colorDark: '#1a1a2e', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  }).catch(() => {
    const url = window.location.origin + '/';
    document.getElementById('qrcode-container').innerHTML = `
      <div id="qrcode-fallback"></div>
      <div><p style="font-size:14px;font-weight:700;color:#4361ee;cursor:pointer;" onclick="copiarUrl('${url}')">${url}</p></div>
    `;
    new QRCode(document.getElementById('qrcode-fallback'), {
      text: url, width: 140, height: 140,
      colorDark: '#1a1a2e', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  });
}

function imprimirQR() {
  const canvas = document.querySelector('#qrcode-single canvas');
  const img = document.querySelector('#qrcode-single img');
  const url = urlsQR[0] || '';
  let src = '';
  if (canvas) src = canvas.toDataURL();
  else if (img) src = img.src;
  if (!src) return;
  const win = window.open('', '_blank');
  win.document.write('<html><head><title>QR Code Bolão</title><style>body{text-align:center;padding:40px;font-family:sans-serif;}img{max-width:90%;width:400px;}p{font-size:18px;color:#4361ee;margin-top:16px;}@media print{button{display:none}}</style></head><body><img src="' + src + '" alt="QR Code"><p><strong>' + url + '</strong></p><p><button onclick="window.print()" style="padding:10px 24px;font-size:16px;">🖨️ Imprimir</button></p><p style="font-size:14px;color:#888;">Aponte a câmera do celular para participar do Bolão</p></body></html>');
  win.document.close();
}

function copiarUrl(url) {
  navigator.clipboard.writeText(url).then(() => mostrarToast('Link copiado!', 'sucesso'));
}


// --- Config ---

let config = { titulo: 'Bolão' };

async function carregarConfig() {
  try {
    const r = await fetch('bolao_config.json');
    config = await r.json();
  } catch (e) {
    config = JSON.parse(localStorage.getItem('bolao_config.json') || '{"titulo":"Bolão"}');
  }
  document.getElementById('cfg-titulo').value = config.titulo || 'Bolão';
  document.querySelector('h1 span').textContent = config.titulo || 'Bolão';

  try {
    const si = await fetch('server-ip').then(r => r.json());
    const ips = si.interfaces.map(i => `${i.ip}:${si.port}${si.basePath || ''}`).join(', ');
    document.getElementById('cfg-server-info').innerHTML = `🌐 Servidor: <strong>${si.hostname}</strong> (${ips})`;
  } catch (e) {
    document.getElementById('cfg-server-info').textContent = '🌐 IP: ' + window.location.host;
  }
}

async function salvarTitulo() {
  const val = document.getElementById('cfg-titulo').value.trim() || 'Bolão';
  config.titulo = val;
  await salvarJSON('bolao_config.json', config);
  document.querySelector('h1 span').textContent = val;
  mostrarToast('Título atualizado!', 'sucesso');
}

// --- Salvar ---

async function salvarJSON(arquivo, dados) {
  localStorage.setItem(arquivo, JSON.stringify(dados, null, 2));
  try {
    await fetch(arquivo, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dados, null, 2) });
  } catch (e) {}
}

async function recarregarDados() {
  try {
    const [rj, rp, rpp] = await Promise.all([
      fetch('jogos.json').then(r => r.json()),
      fetch('participantes.json').then(r => r.json()),
      fetch('palpites.json').then(r => r.json())
    ]);
    jogos = rj; participantes = rp; palpites = rpp;
    localStorage.setItem('jogos.json', JSON.stringify(jogos));
    localStorage.setItem('participantes.json', JSON.stringify(participantes));
    localStorage.setItem('palpites.json', JSON.stringify(palpites));
    renderAdmin();
  } catch (e) {}
}

// --- Abas ---
function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === tabId));
}
document.getElementById('tabBar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (btn) switchTab(btn.dataset.tab);
});

// --- Init ---
gerarQRCode();
carregarConfig().then(() => carregarDados());
setInterval(recarregarDados, 30000);
</script>
